<!DOCTYPE html>
<html>
<head>
    <title>Employee Audit Logging System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Employee Management with Audit Logging</h2>

<div class="container">
    <h3>Add / Update Employee</h3>
    <input type="text" id="empId" placeholder="Employee ID">
    <input type="text" id="empName" placeholder="Employee Name">
    <input type="number" id="salary" placeholder="Salary">
    <button id="saveBtn">Save</button>
</div>

<div class="container">
    <h3>Employee Table</h3>
    <table id="employeeTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Salary</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<div class="container">
    <h3>Audit Log (Trigger Simulation)</h3>
    <table id="auditTable">
        <thead>
            <tr>
                <th>Emp ID</th>
                <th>Action</th>
                <th>Old Salary</th>
                <th>New Salary</th>
                <th>Time</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<div class="container">
    <h3>Daily Activity Report (View Simulation)</h3>
    <table id="reportTable">
        <thead>
            <tr>
                <th>Date</th>
                <th>Total Inserts</th>
                <th>Total Updates</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script src="script.js"></script>

</body>
</html>
